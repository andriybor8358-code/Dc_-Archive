<!DOCTYPE html>
<html lang="uk">
<head>

<body>

    <div class="background-overlay"></div>

        <div class="cards-container">
            
            <a href="heroes.html" class="hub-card card-heroes">

                    <h2 class="card-title">Heroes Archive</h2>
                    <div class="card-badge"></div>
                </div>

            <a href="villains.html" class="hub-card card-villains">

        </div>

    <footer>
        <ul class="footer-nav">
            <li><a href="index.html" class="active">Home</a></li>
